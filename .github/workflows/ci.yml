name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  jvm-tests:
    name: JVM + Android Tests (ubuntu, JDK 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          cat > local.properties << 'EOF'
          anthropic_api_key=placeholder
          google_api_key=placeholder
          openai_api_key=placeholder
          EOF

      - name: Run ktlint
        timeout-minutes: 10
        run: ./gradlew ktlintCheck

      - name: Run JVM + Android tests
        timeout-minutes: 20
        run: ./gradlew :ampere-core:jvmTest :ampere-core:testDebugUnitTest :ampere-cli:jvmTest :ampere-compose:jvmTest :ampere-compose:testDebugUnitTest

  ios-tests:
    name: iOS Simulator Tests (macos, JDK 21)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          cat > local.properties << 'EOF'
          anthropic_api_key=placeholder
          google_api_key=placeholder
          openai_api_key=placeholder
          EOF

      - name: Run iOS simulator tests
        timeout-minutes: 25
        run: ./gradlew :ampere-core:iosSimulatorArm64Test
