name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Tests (${{ matrix.os }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            java: '17'
            ios: false
          - os: macos-latest
            java: '21'
            ios: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create local.properties
        run: |
          cat > local.properties << 'EOF'
          anthropic_api_key=placeholder
          google_api_key=placeholder
          openai_api_key=placeholder
          EOF

      - name: Run ktlint
        timeout-minutes: 10
        run: ./gradlew ktlintCheck

      - name: Run JVM + Android tests
        timeout-minutes: 20
        run: ./gradlew :ampere-core:jvmTest :ampere-core:testDebugUnitTest :ampere-cli:jvmTest :ampere-compose:jvmTest :ampere-compose:testDebugUnitTest

      - name: Run iOS simulator tests
        if: ${{ matrix.ios }}
        timeout-minutes: 25
        run: ./gradlew :ampere-core:iosSimulatorArm64Test
